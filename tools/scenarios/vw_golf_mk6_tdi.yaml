# VW Golf Mk6 2.0 TDI (CBDB/CFGB engine) — 2010 model year
# WMI WVW = Volkswagen AG Germany (Golf / Jetta / Passat range)
#
# CAN address map:
#   ECM physical : 0x7E0 (request) / 0x7E8 (response)
#   Broadcast    : 0x7DF (request) / 0x7E8 (response)
#   Gateway      : 0x7D9 (request) / 0x7DA (response)
#
# All byte arrays are decimal. Hex integers (0x...) are parsed by PyYAML.

description: "VW Golf Mk6 2.0 TDI — healthy idle"
vin: "WVWZZZ1KZBM057145"

ecm_rx: 0x7E0
ecm_tx: 0x7E8
gw_rx:  0x7D9
gw_tx:  0x7DA

# ── Mode 01 supported-PID bitmasks ────────────────────────────────────────────
# Same engine-control PIDs as the Transit: load, coolant, MAP, RPM, speed,
# intake-temp, MAF; then EGR command/error (0x2C/0x2D); then voltage (0x42).
supported_pids:
  0:  0x183B0001   # PIDs 0x01–0x20
  32: 0x00180001   # PIDs 0x21–0x40: 0x2C(EGR cmd) 0x2D(EGR err) + next
  64: 0x40000000   # PIDs 0x41–0x60: 0x42(voltage)

# ── Mode 01 responses ─────────────────────────────────────────────────────────
mode01:
  # ENGINE_LOAD = A × 100 / 255 → 38 / 255 × 100 ≈ 14.9 %
  4:  [38]
  # COOLANT_TEMP = A − 40 → 120 − 40 = 80 °C
  5:  [120]
  # MAP / INTAKE_PRESSURE = A kPa → 100 kPa
  11: [100]
  # RPM = (A×256+B) / 4 → (12×256+128) / 4 = 800 rpm
  12: [12, 128]
  # SPEED = A km/h → 0 (stationary)
  13: [0]
  # INTAKE_TEMP = A − 40 → 70 − 40 = 30 °C
  15: [70]
  # MAF = (A×256+B) / 100 → (3×256+32) / 100 = 8.0 g/s
  16: [3, 32]
  # COMMANDED_EGR = A × 100 / 255 → 76 / 255 × 100 ≈ 29.8 %
  44: [76]
  # EGR_ERROR = (A−128) × 100 / 128 → 0 %
  45: [128]
  # CONTROL_MODULE_VOLTAGE = (A×256+B) / 1000 V → 14.3 V
  66: [55, 224]

# ── DTC lists ─────────────────────────────────────────────────────────────────
# P2002 = DPF particulate filter efficiency below threshold — common on TDIs
#         with high mileage or infrequent motorway runs.
dtcs_stored:    ["P2002"]
dtcs_pending:   []
dtcs_permanent: []

# ── Mode 22 (UDS 0x22) responses — ECM ────────────────────────────────────────
mode22:
  # 0xF189  ECU software version (ASCII "0001")
  61833: [48, 48, 48, 49]
  # 0x115E  Boost pressure setpoint (mbar) — 1600 mbar = 1.6 bar
  4446:  [6, 64]
  # 0x115F  Boost pressure actual (mbar) — 1500 mbar = 1.5 bar (slight under-read)
  4447:  [5, 220]
  # 0x1197  Exhaust gas temperature pre-DPF (°C) — 450°C warm idle
  4503:  [1, 194]
  # 0x1803  DPF soot mass (raw; ÷10 = grams) — 5.0 g (filter clean enough)
  6147:  [0, 50]

# ── Mode 22 (UDS 0x22) responses — Gateway (0x7D9) ───────────────────────────
gw_mode22:
  # 0xF190  VIN (17 ASCII bytes)
  61840: "WVWZZZ1KZBM057145"

# ── Degraded profile ──────────────────────────────────────────────────────────
# Scenario: DPF severely clogged causing back-pressure → turbo underboost (P0299).
# EGR also stuck closed from back-pressure soot (P0401 pending).
degraded:
  mode01:
    # MAP drops to 88 kPa — underboost at idle
    11: [88]
    # EGR_ERROR: stuck → error near −100 %
    45: [0]

  dtcs_stored:  ["P2002", "P0299"]
  dtcs_pending: ["P0299", "P0401"]

  mode22:
    # DPF soot mass: 40.0 g (filter clogged — regeneration overdue)
    6147: [1, 144]
    # Boost actual: 1024 mbar (low due to back-pressure)
    4447: [4, 0]
